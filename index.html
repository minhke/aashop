<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AASHOP Camera</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #fff;
  color: #111;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid #eee;
}

.menu a {
  margin: 0 15px;
  text-decoration: none;
  color: #111;
  font-weight: 500;
}

/* BANNER */
.banner {
  height: 400px;
  background: url('https://images.unsplash.com/photo-1519183071298-a2962be96b6e') center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-left: 50px;
  color: white;
}

.banner h1 {
  font-size: 40px;
}

.banner button {
  width: 200px;
  padding: 10px;
  border: none;
  background: #d4af37;
  color: black;
  margin-top: 10px;
}

/* CATEGORY */
.categories {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 20px;
  padding: 40px;
}

.cat {
  background: #f5f5f5;
  padding: 30px;
  text-align: center;
  font-weight: bold;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 20px;
  padding: 40px;
}

.product {
  text-align: center;
}

.product img {
  width: 100%;
}

/* FOOTER */
footer {
  background: #111;
  color: white;
  padding: 30px;
  text-align: center;
}
</style>
</head>

<body>

<header>
  <h2>AASHOP</h2>
  <div class="menu">
    <a href="#">Trang chủ</a>
    <a href="#">Lens</a>
    <a href="#">Filter</a>
    <a href="#">Phụ kiện</a>
  </div>
</header>

<div class="banner">
  <h1>PHỤ KIỆN MÁY ẢNH CAO CẤP</h1>
  <button>XEM SẢN PHẨM</button>
</div>

<section class="categories">
  <div class="cat">Lens</div>
  <div class="cat">Filter</div>
  <div class="cat">Tripod</div>
  <div class="cat">Storage</div>
</section>

<section class="products">
  <div class="product">
    <img src="https://via.placeholder.com/300">
    <p>ND Filter</p>
    <p>500.000đ</p>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/300">
    <p>Tripod</p>
    <p>1.200.000đ</p>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/300">
    <p>Pin Sony</p>
    <p>300.000đ</p>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/300">
    <p>SSD Samsung</p>
    <p>2.000.000đ</p>
  </div>
</section>

<footer>
  © 2026 AASHOP - Camera Accessories
</footer>

</body>
</html>
