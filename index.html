<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AASHOP Camera</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#f5f5f5}

/* TOP */
.topbar{
  background:#8b0000;
  color:white;
  padding:8px 40px;
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

/* HEADER */
header{
  background:white;
  padding:20px 40px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{font-size:22px;font-weight:bold;color:#c40000}

.search input{
  padding:10px;
  width:300px;
  border-radius:20px;
  border:1px solid #ddd;
}

/* NAV */
.nav{
  backdrop-filter:blur(12px);
  background:rgba(180,0,0,0.95);
}

.menu{
  display:flex;
  justify-content:center;
  gap:60px;
  padding:18px 0;
}

.menu a{
  font-family:'Noto Sans JP';
  color:white;
  text-decoration:none;
  position:relative;
}

.menu a::after{
  content:"";
  position:absolute;
  bottom:-6px;
  left:0;
  width:0;
  height:2px;
  background:white;
  transition:0.3s;
}

.menu a:hover::after{width:100%}

/* ===== SLIDER XỊN ===== */
.slider{
  position:relative;
  height:450px;
  overflow:hidden;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  opacity:0;
  transition:opacity 1s ease;
}

.slide.active{
  opacity:1;
}

/* IMAGE */
.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* OVERLAY TEXT */
.caption{
  position:absolute;
  bottom:80px;
  left:80px;
  color:white;
}

.caption h2{
  font-size:40px;
  margin-bottom:10px;
}

.caption p{
  font-size:18px;
}

/* DARK OVERLAY */
.slide::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.3);
}

/* BUTTON */
.prev,.next{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.4);
  color:white;
  border:none;
  font-size:30px;
  padding:10px 15px;
  cursor:pointer;
}

.prev{left:20px}
.next{right:20px}

/* DOT */
.dots{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
}

.dot{
  display:inline-block;
  width:10px;
  height:10px;
  background:white;
  margin:5px;
  border-radius:50%;
  opacity:0.5;
  cursor:pointer;
}

.dot.active{
  opacity:1;
}

/* CATEGORY */
.title{
  text-align:center;
  margin:40px 0;
  color:#c40000;
}

.categories{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  padding:0 40px 50px;
}

.cat{
  position:relative;
}

.cat img{
  width:100%;
  height:250px;
  object-fit:cover;
}

.label{
  position:absolute;
  bottom:20px;
  left:20px;
  background:white;
  padding:10px;
}

/* FOOTER */
footer{
  background:#111;
  color:#aaa;
  padding:40px;
  text-align:center;
}
</style>
</head>

<body>

<div class="topbar">
  <div>📞 0975 152 816</div>
  <div>08:00 - 17:00</div>
</div>

<header>
  <div class="logo">AASHOP</div>
  <div class="search">
    <input placeholder="Tìm kiếm...">
  </div>
</header>

<div class="nav">
  <div class="menu">
    <a href="#">TRANG CHỦ</a>
    <a href="#">SẢN PHẨM</a>
    <a href="tintuc.html">TIN TỨC</a>
    <a href="#">LIÊN HỆ</a>
  </div>
</div>

<!-- SLIDER -->
<div class="slider">

  <div class="slide active">
    <img src="https://images.unsplash.com/photo-1519183071298-a2962be96b6e">
    <div class="caption">
      <h2>PHỤ KIỆN MÁY ẢNH</h2>
      <p>Chính hãng - Cao cấp</p>
    </div>
  </div>

  <div class="slide">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    <div class="caption">
      <h2>DÂY ĐEO CAO CẤP</h2>
      <p>Thiết kế Nhật Bản</p>
    </div>
  </div>

  <div class="slide">
    <img src="https://images.unsplash.com/photo-1580894908361-967195033215">
    <div class="caption">
      <h2>TÚI MÁY ẢNH</h2>
      <p>Bảo vệ tối đa</p>
    </div>
  </div>

  <button class="prev" onclick="prev()">‹</button>
  <button class="next" onclick="next()">›</button>

  <div class="dots">
    <span class="dot active" onclick="go(0)"></span>
    <span class="dot" onclick="go(1)"></span>
    <span class="dot" onclick="go(2)"></span>
  </div>

</div>

<h2 class="title">DANH MỤC SẢN PHẨM</h2>

<section class="categories">
  <div class="cat">
    <img src="https://images.unsplash.com/photo-1519183071298-a2962be96b6e">
    <div class="label">DÂY ĐEO</div>
  </div>

  <div class="cat">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    <div class="label">PHỤ KIỆN</div>
  </div>

  <div class="cat">
    <img src="https://images.unsplash.com/photo-1580894908361-967195033215">
    <div class="label">TÚI LENS</div>
  </div>

  <div class="cat">
    <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
    <div class="label">TÚI MÁY ẢNH</div>
  </div>
</section>

<footer>
© 2026 AASHOP
</footer>

<script>
let slides = document.querySelectorAll(".slide");
let dots = document.querySelectorAll(".dot");
let index = 0;

function showSlide(i){
  slides.forEach(s=>s.classList.remove("active"));
  dots.forEach(d=>d.classList.remove("active"));

  slides[i].classList.add("active");
  dots[i].classList.add("active");
}

function next(){
  index = (index+1)%slides.length;
  showSlide(index);
}

function prev(){
  index = (index-1+slides.length)%slides.length;
  showSlide(index);
}

function go(i){
  index = i;
  showSlide(index);
}

setInterval(next,4000);
</script>

</body>
</html>
