<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aashop</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  border-bottom: 1px solid #eee;
}

nav a {
  margin-left: 20px;
  text-decoration: none;
  color: black;
}

.hero {
  height: 90vh;
  background: url('https://images.unsplash.com/photo-1518546305927-5a555bb7020d') center/cover;
  display: flex;
  align-items: center;
  padding-left: 50px;
  color: white;
}

.hero h1 {
  font-size: 48px;
}

.section {
  padding: 60px 30px;
  text-align: center;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
}

.card {
  border: 1px solid #eee;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
}

.card div {
  padding: 10px;
}

.btn {
  display: inline-block;
  padding: 10px 15px;
  background: black;
  color: white;
  text-decoration: none;
  margin-top: 10px;
}

footer {
  background: black;
  color: white;
  padding: 20px;
}

</style>
</head>

<body>

<header>
  <h2>Aashop</h2>
  <nav>
    <a href="#">Trang chủ</a>
    <a href="#">Sản phẩm</a>
    <a href="#">Liên hệ</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h1>Dây đồng hồ cao cấp</h1>
    <p>Phong cách - Đẳng cấp</p>
    <a class="btn">Xem ngay</a>
  </div>
</section>

<section class="section">
  <h2>Sản phẩm nổi bật</h2>

  <div class="products">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1523170335258-f5c6c6bd8b54">
      <div>
        <h3>Dây da</h3>
        <p>500.000đ</p>
        <a class="btn">Mua</a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b">
      <div>
        <h3>Dây kim loại</h3>
        <p>700.000đ</p>
        <a class="btn">Mua</a>
      </div>
    </div>
  </div>
</section>

<footer>
  <p>© Aashop</p>
</footer>

</body>
</html>
