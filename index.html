<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AASHOP Camera</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  background: #f5f5f5;
}

/* TOP BAR */
.topbar {
  background: #8b0000;
  color: white;
  padding: 8px 40px;
  font-size: 14px;
  display: flex;
  justify-content: space-between;
}

/* HEADER */
header {
  background: white;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #c40000;
}

.search {
  width: 40%;
}

.search input {
  width: 100%;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 20px;
}

/* MENU */
.nav {
  background: #c40000;
  padding: 12px 40px;
}

.nav a {
  color: white;
  margin-right: 30px;
  text-decoration: none;
  font-weight: bold;
}

/* BANNER */
.banner {
  width: 100%;
  height: 400px;
  background: url('https://images.unsplash.com/photo-1519183071298-a2962be96b6e') center/cover;
}

/* TITLE */
.section-title {
  text-align: center;
  margin: 40px 0;
  font-size: 22px;
  color: #c40000;
  font-weight: bold;
}

/* CATEGORY GRID */
.categories {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  gap: 20px;
  padding: 0 40px 60px;
}

.cat {
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

.cat img {
  width: 100%;
  height: 250px;
  object-fit: cover;
  transition: 0.3s;
}

.cat:hover img {
  transform: scale(1.05);
}

/* LABEL */
.cat-label {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: white;
  padding: 10px 20px;
  font-size: 14px;
  text-align: center;
}

.cat-label strong {
  display: block;
  font-size: 16px;
}

.cat-label span {
  font-size: 12px;
  color: #666;
}

/* FOOTER */
footer {
  background: #111;
  color: #aaa;
  padding: 40px;
  text-align: center;
}

/* MOBILE */
@media(max-width: 768px){
  .categories {
    grid-template-columns: repeat(2,1fr);
  }

  .search {
    display: none;
  }
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div>📞 0975 152 816</div>
  <div>⏰ 08:00 - 17:00</div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">AASHOP</div>
  <div class="search">
    <input placeholder="Tìm kiếm...">
  </div>
</header>

<!-- NAV -->
<div class="nav">
  <a href="#">TRANG CHỦ</a>
  <a href="#">SẢN PHẨM</a>
  <a href="#">TIN TỨC</a>
  <a href="#">LIÊN HỆ</a>
</div>

<!-- BANNER -->
<div class="banner"></div>

<!-- CATEGORY -->
<h2 class="section-title">DANH MỤC SẢN PHẨM</h2>

<section class="categories">

  <div class="cat">
    <img src="https://images.unsplash.com/photo-1519183071298-a2962be96b6e">
    <div class="cat-label">
      <strong>KHUYẾN MÃI</strong>
      <span>1 SẢN PHẨM</span>
    </div>
  </div>

  <div class="cat">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    <div class="cat-label">
      <strong>PHỤ KIỆN KHÁC</strong>
      <span>2 SẢN PHẨM</span>
    </div>
  </div>

  <div class="cat">
    <img src="https://images.unsplash.com/photo-1580894908361-967195033215">
    <div class="cat-label">
      <strong>TÚI ĐỰNG LENS</strong>
      <span>2 SẢN PHẨM</span>
    </div>
  </div>

  <div class="cat">
    <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8">
    <div class="cat-label">
      <strong>TÚI ĐỰNG MÁY ẢNH</strong>
      <span>5 SẢN PHẨM</span>
    </div>
  </div>

</section>

<footer>
  © 2026 AASHOP - Camera Accessories
</footer>

</body>
</html>
